#cloud-config
# First-boot setup for the WhatsApp follow-up assistant on Ubuntu 24.04 (Arm64).
# Installs Node 20, clones the repo, installs deps, installs the systemd units (from the
# repo's deploy/ dir) and ENABLES them (does NOT start — needs .env + a one-time QR scan first).
# The GitHub Actions self-hosted runner is set up separately in deploy/RUNBOOK.md.

package_update: true
packages:
  - git
  - build-essential
  - curl
  - ca-certificates

write_files:
  # Let appuser restart only the two app services (used by the CD workflow), no password.
  - path: /etc/sudoers.d/wa-app
    permissions: "0440"
    owner: root:root
    content: |
      appuser ALL=(root) NOPASSWD: /usr/bin/systemctl restart wa-listener wa-worker, /usr/bin/systemctl restart wa-listener, /usr/bin/systemctl restart wa-worker

runcmd:
  # Node 20 (NodeSource, arm64) — install in one step so the repo+update are fresh
  - [ bash, -c, "curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs" ]
  # App user + checkout
  - [ bash, -c, "id -u appuser >/dev/null 2>&1 || useradd -m -s /bin/bash appuser" ]
  - [ bash, -c, "git clone https://github.com/insync360/anand-whatapp-automation.git /opt/wa-app" ]
  - [ bash, -c, "[ -f /opt/wa-app/.env ] || cp /opt/wa-app/.env.example /opt/wa-app/.env" ]
  - [ bash, -c, "chown -R appuser:appuser /opt/wa-app" ]
  # Dependencies (installs devDeps incl. tsx — do NOT set NODE_ENV=production here)
  - [ bash, -c, "cd /opt/wa-app && sudo -u appuser npm ci" ]
  # systemd units (single source of truth lives in the repo's deploy/ dir)
  - [ bash, -c, "install -m 0644 /opt/wa-app/deploy/wa-listener.service /etc/systemd/system/wa-listener.service" ]
  - [ bash, -c, "install -m 0644 /opt/wa-app/deploy/wa-worker.service /etc/systemd/system/wa-worker.service" ]
  - [ systemctl, daemon-reload ]
  - [ systemctl, enable, wa-listener.service, wa-worker.service ]

final_message: "wa-app base ready. Next: fill /opt/wa-app/.env, register the runner, scan the WhatsApp QR (see deploy/RUNBOOK.md), then start the services."
